set -g mouse on
set-window-option -g mode-keys vi
set -g allow-passthrough on
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
set -g activity-action other
# -S -32768: Grab the entire scrollback (up to the default max limit)
# -E -: Grab until the very last line currently in the buffer
bind-key Y capture-pane -e -S -32768 -E - \; save-buffer ~/last_capture.svslog \; new-window -n "capture" "svim ~/last_capture.svslog"

# Move along Windows
bind -n C-Right next-window
bind -n C-Left previous-window
# Swap current window with previous / next
bind -n C-S-Left  swap-window -t :-1 \; select-window -t :-1
bind -n C-S-Right swap-window -t :+1 \; select-window -t :+1

# Move along split panes
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up    select-pane -U
bind -n S-Down  select-pane -D

bind-key -n C-w kill-pane

